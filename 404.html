<style>
/* Self-hosted Cormorant Garamond (variable, OFL-1.1) — italic faces only,
   since every visible glyph on this page is italic. Paths are ABSOLUTE
   (/assets/…) on purpose: GitHub Pages serves 404.html at whatever broken
   URL was requested (e.g. /alvita/typo), so relative paths would resolve
   against that path and 404 themselves. */
@font-face{
  font-family:'Cormorant Garamond'; font-style:italic; font-display:swap; font-weight:300 700;
  src:url('/assets/fonts/cormorant-garamond-latin-ext-wght-italic.woff2') format('woff2-variations');
  unicode-range:U+0100-02BA,U+02BD-02C5,U+02C7-02CC,U+02CE-02D7,U+02DD-02FF,U+0304,U+0308,U+0329,U+1D00-1DBF,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20C0,U+2113,U+2C60-2C7F,U+A720-A7FF;
}
@font-face{
  font-family:'Cormorant Garamond'; font-style:italic; font-display:swap; font-weight:300 700;
  src:url('/assets/fonts/cormorant-garamond-latin-wght-italic.woff2') format('woff2-variations');
  unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;
}
:root{ color-scheme:only light; }
body{
  margin:0; min-height:100vh; display:grid; place-items:center; text-align:center;
  font-family:'Cormorant Garamond', Georgia, 'Times New Roman', serif; color:#6b5335;
  background:linear-gradient(180deg,#faf5eb,#f2e8d6); padding:24px;
}
a{ color:#b98a2f; }
p{ font-size:20px; font-style:italic; }
</style>
</head>
